<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1280px; height: 720px; overflow: hidden; }
  .cover {
    width: 1280px; height: 720px;
    background: #FAF6EF;
    font-family: 'Segoe UI', Verdana, sans-serif;
    display: flex;
    position: relative;
  }
  .left {
    flex: 1.15;
    padding: 70px 30px 70px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    z-index: 2;
  }
  .brand { font-size: 44px; font-weight: 800; color: #2E7D5B; letter-spacing: -1px; margin-bottom: 26px; }
  .brand span { color: #2C5F8A; }
  .level-badge {
    display: inline-block;
    align-self: flex-start;
    background: #FBF4DF;
    border: 3px solid #C9971C;
    color: #8A6A10;
    border-radius: 40px;
    padding: 10px 28px;
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 28px;
  }
  h1 { font-size: 74px; font-weight: 800; color: #2B2B2B; line-height: 1.05; margin-bottom: 24px; letter-spacing: -2px; }
  h1 em { font-style: normal; color: #2E7D5B; }
  .sub { font-size: 30px; color: #6B6355; line-height: 1.45; margin-bottom: 34px; max-width: 560px; }
  .chips { display: flex; gap: 14px; flex-wrap: wrap; }
  .chip {
    background: #E7F2EC; border: 2px solid #2E7D5B; color: #2E7D5B;
    border-radius: 14px; padding: 10px 20px; font-size: 22px; font-weight: 700;
  }
  .right {
    flex: 0.85;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .blob {
    position: absolute;
    width: 620px; height: 620px;
    background: #F3E9D7;
    border-radius: 50%;
    right: -120px;
  }
  svg { position: relative; z-index: 2; }
</style>
</head>
<body>
<div class="cover">
  <div class="left">
    <div class="brand">Neuro<span>Fit</span></div>
    <div class="level-badge">⭐ NIVEL 2</div>
    <h1>Ahora vamos<br><em>por más</em></h1>
    <div class="sub">20 ejercicios adicionales de neuroplasticidad para Parkinson. Basados en ciencia. Pago único.</div>
    <div class="chips">
      <div class="chip">🧠 Basado en evidencia</div>
      <div class="chip">🏠 Con objetos de casa</div>
      <div class="chip">✓ Sin suscripción</div>
    </div>
  </div>
  <div class="right">
    <div class="blob"></div>
    <svg viewBox="0 0 200 200" width="470" height="470" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="95" fill="#FFFFFF" stroke="#E5DCC9" stroke-width="3"/>
      <!-- figura brazos al cielo, estilo app -->
      <circle cx="146" cy="44" r="14" fill="#E8C13D" stroke="#E8A13D" stroke-width="4"/>
      <path d="M146 22 L146 14 M164 30 L170 24 M168 44 L178 44" stroke="#E8A13D" stroke-width="4" stroke-linecap="round"/>
      <circle cx="88" cy="66" r="14" fill="#F5D5B8" stroke="#3A3A3A" stroke-width="4"/>
      <path d="M88 80 L88 126" stroke="#4E8D7C" stroke-width="10" stroke-linecap="round"/>
      <path d="M88 90 L126 54 M88 94 L58 112" stroke="#4E8D7C" stroke-width="8" stroke-linecap="round"/>
      <path d="M88 126 L70 166 M88 126 L106 166" stroke="#3A5B8C" stroke-width="9" stroke-linecap="round"/>
      <path d="M40 150 Q100 185 160 150" stroke="#2E7D5B" stroke-width="4" stroke-dasharray="2 9" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
</div>
</body>
</html>
