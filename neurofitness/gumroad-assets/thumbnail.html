<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 1200px; overflow: hidden; }
  .thumb {
    width: 1200px; height: 1200px;
    background: #FAF6EF;
    font-family: 'Segoe UI', Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px;
  }
  .brand { font-size: 84px; font-weight: 800; color: #2E7D5B; letter-spacing: -2px; margin-bottom: 18px; }
  .brand span { color: #2C5F8A; }
  .level-badge {
    background: #FBF4DF;
    border: 4px solid #C9971C;
    color: #8A6A10;
    border-radius: 60px;
    padding: 14px 44px;
    font-size: 42px;
    font-weight: 800;
    margin-bottom: 40px;
  }
  .sub { font-size: 44px; color: #6B6355; font-weight: 700; margin-top: 40px; line-height: 1.4; }
  .sub em { font-style: normal; color: #2E7D5B; }
</style>
</head>
<body>
<div class="thumb">
  <div class="brand">Neuro<span>Fit</span></div>
  <div class="level-badge">⭐ NIVEL 2 — COMPLETO</div>
  <svg viewBox="0 0 200 200" width="520" height="520" xmlns="http://www.w3.org/2000/svg">
    <circle cx="100" cy="100" r="95" fill="#FFFFFF" stroke="#E5DCC9" stroke-width="3"/>
    <circle cx="146" cy="44" r="14" fill="#E8C13D" stroke="#E8A13D" stroke-width="4"/>
    <path d="M146 22 L146 14 M164 30 L170 24 M168 44 L178 44" stroke="#E8A13D" stroke-width="4" stroke-linecap="round"/>
    <circle cx="88" cy="66" r="14" fill="#F5D5B8" stroke="#3A3A3A" stroke-width="4"/>
    <path d="M88 80 L88 126" stroke="#4E8D7C" stroke-width="10" stroke-linecap="round"/>
    <path d="M88 90 L126 54 M88 94 L58 112" stroke="#4E8D7C" stroke-width="8" stroke-linecap="round"/>
    <path d="M88 126 L70 166 M88 126 L106 166" stroke="#3A5B8C" stroke-width="9" stroke-linecap="round"/>
    <path d="M40 150 Q100 185 160 150" stroke="#2E7D5B" stroke-width="4" stroke-dasharray="2 9" stroke-linecap="round" fill="none"/>
  </svg>
  <div class="sub">20 ejercicios de neuroplasticidad<br><em>Ahora vamos por más</em></div>
</div>
</body>
</html>
